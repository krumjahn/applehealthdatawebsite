<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apple Health Export Validator (Free Tool)</title>
  <meta name="description" content="Quickly validate if your Apple Health export is complete and analysis-ready before converting to CSV or AI analysis." />
  <link rel="canonical" href="https://applehealthdata.com/apple-health-export-validator/" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{font-family:Plus Jakarta Sans,system-ui,-apple-system,sans-serif;background:#020617;color:#f8fafc}.mesh{position:fixed;inset:0;z-index:-1;background:radial-gradient(at 0% 0%,rgba(225,29,72,.16),transparent 50%),radial-gradient(at 100% 0%,rgba(56,189,248,.16),transparent 50%),radial-gradient(at 100% 100%,rgba(168,85,247,.16),transparent 50%);filter:blur(60px)}.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:1rem}label{font-size:.9rem;color:#cbd5e1}</style>
</head>
<body>
  <div class="mesh"></div>
  <main class="max-w-4xl mx-auto px-4 py-10">
    <a href="/" class="text-slate-300 hover:text-white text-sm">← Back to home</a>
    <section class="card p-6 mt-3">
      <h1 class="text-3xl font-extrabold">Apple Health Export Validator</h1>
      <p class="text-slate-300 mt-3">Fast check before you convert to CSV or run AI analysis.</p>
    </section>

    <section class="card p-6 mt-5">
      <h2 class="text-xl font-bold mb-4">Validation inputs</h2>
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label for="size">Export ZIP size (MB)</label>
          <input id="size" type="number" min="0" step="0.1" class="mt-1 w-full rounded-lg bg-slate-900 border border-white/10 p-2" placeholder="e.g. 150" />
        </div>
        <div>
          <label for="records">Estimated record count</label>
          <input id="records" type="number" min="0" step="1" class="mt-1 w-full rounded-lg bg-slate-900 border border-white/10 p-2" placeholder="e.g. 50000" />
        </div>
        <div class="flex items-center gap-2">
          <input id="hasxml" type="checkbox" class="h-4 w-4" />
          <label for="hasxml">Contains <code>export.xml</code></label>
        </div>
        <div class="flex items-center gap-2">
          <input id="hasworkout" type="checkbox" class="h-4 w-4" />
          <label for="hasworkout">Contains workout routes/files (if expected)</label>
        </div>
      </div>
      <button id="run" class="mt-5 px-4 py-2 rounded-lg bg-rose-600 hover:bg-rose-700 font-semibold">Run validation</button>
      <div id="result" class="mt-5 text-slate-200"></div>
    </section>

    <section class="card p-6 mt-5">
      <h2 class="text-xl font-bold">Next steps</h2>
      <div class="mt-3 flex flex-wrap gap-3 text-sm">
        <a href="/convert-tool/" class="px-3 py-2 rounded-lg bg-white/10 hover:bg-white/20">Convert XML to CSV</a>
        <a href="/export-apple-health-data/" class="px-3 py-2 rounded-lg bg-white/10 hover:bg-white/20">Export guide</a>
        <a href="/go/website.html" class="px-3 py-2 rounded-lg bg-white text-black font-semibold">Get App</a>
        <a href="/convert-tool/" class="px-3 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-slate-200">Convert XML to CSV</a>
        <a href="/export-apple-health-data/" class="px-3 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-slate-200">Export guide</a>
        <a href="/go/website.html" class="px-3 py-2 rounded-lg bg-white text-black font-semibold">Get App</a>
      </div>
    </section>
  </main>

  <script>
    const run = document.getElementById('run');
    run.addEventListener('click', () => {
      const size = parseFloat(document.getElementById('size').value || '0');
      const records = parseInt(document.getElementById('records').value || '0', 10);
      const hasxml = document.getElementById('hasxml').checked;
      const hasworkout = document.getElementById('hasworkout').checked;
      let score = 0;
      const notes = [];

      if (hasxml) { score += 40; notes.push('✅ export.xml found'); }
      else { notes.push('❌ Missing export.xml'); }

      if (size >= 20) { score += 20; notes.push('✅ ZIP size looks realistic'); }
      else if (size > 0) { score += 10; notes.push('⚠️ ZIP size is small — verify full export range'); }
      else { notes.push('⚠️ Add ZIP size for better confidence'); }

      if (records >= 5000) { score += 25; notes.push('✅ Record count suggests usable history'); }
      else if (records > 0) { score += 12; notes.push('⚠️ Low record count — check if date range is limited'); }
      else { notes.push('⚠️ Add record estimate for better confidence'); }

      if (hasworkout) { score += 15; notes.push('✅ Workout-related files included'); }

      let grade = 'Needs Review';
      if (score >= 75) grade = 'Good to Analyze';
      if (score >= 90) grade = 'Excellent';

      document.getElementById('result').innerHTML = `
        <div class="p-4 rounded-xl bg-slate-900/70 border border-white/10">
          <div class="text-lg font-bold mb-2">Validation: ${grade} (${score}/100)</div>
          <ul class="list-disc pl-6 space-y-1">${notes.map(n=>`<li>${n}</li>`).join('')}</ul>
        </div>`;
    });
  </script>
</body>
</html>
